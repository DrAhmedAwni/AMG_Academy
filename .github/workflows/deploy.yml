name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: amg_academy_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_KEY: ${{ secrets.VPS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate VPS secrets
        run: |
          test -n "$VPS_HOST" || (echo "::error::Missing GitHub secret VPS_HOST" && exit 1)
          test -n "$VPS_USER" || (echo "::error::Missing GitHub secret VPS_USER" && exit 1)
          test -n "$VPS_KEY" || (echo "::error::Missing GitHub secret VPS_KEY" && exit 1)
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_KEY }}
          script: |
            set -e
            cd /var/www/amg-academy-platform
            test -f .env || (echo "Missing .env on VPS at /var/www/amg-academy-platform/.env" && exit 1)
            git pull --ff-only origin main
            docker compose build
            docker compose run --rm api npx prisma migrate deploy
            docker compose up -d --remove-orphans
            docker compose ps
